name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Prepare evidence directory
        run: mkdir -p artifacts

      - name: Run tests with coverage
        run: |
          set -o pipefail
          pytest 2>&1 | tee artifacts/test.log

      - name: Run lint (ruff)
        run: |
          set -o pipefail
          ruff check src tests 2>&1 | tee artifacts/lint.log

      - name: Run type checking (mypy)
        run: |
          set -o pipefail
          mypy src tests --show-error-codes --pretty 2>&1 | tee artifacts/typecheck.log

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ github.run_id }}
          path: |
            artifacts/test.log
            artifacts/lint.log
            artifacts/typecheck.log
            artifacts/coverage.xml
            artifacts/junit.xml
          if-no-files-found: warn
